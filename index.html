<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartilhar Texto & Pagamento PIX</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; color: #333; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; padding: 10px; box-sizing: border-box; font-size: 14px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-size: 14px; }
        button:hover { background: #0056b3; }
        .resultado { margin-top: 20px; padding: 15px; background: #f8f9fa; border-left: 5px solid #007bff; display: none; }
        input[type="text"] { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        
        /* Estilos do Bloco PIX */
        .bloco-pix { background: #e6f7f4; border: 2px solid #32bcad; padding: 20px; border-radius: 8px; margin-bottom: 30px; text-align: center; }
        .bloco-pix h3 { margin-top: 0; color: #0b1a30; }
        .btn-pix { background: #32bcad; font-weight: bold; margin-top: 10px; width: 100%; max-width: 250px; }
        .btn-pix:hover { background: #26998d; }
        .alerta-copiado { display: none; color: #26998d; font-size: 12px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <!-- Bloco Fixo do PIX Copia e Cola -->
    <div class="bloco-pix">
        <h3>⚡ Pagamento via PIX</h3>
        <p style="font-size: 14px; margin: 5px 0;">Clique no botão abaixo para copiar o código Copia e Cola:</p>
        <button class="btn-pix" onclick="copiarPix()">Copiar Código PIX</button>
        <div id="alerta-pix" class="alerta-copiado">✓ Código Pix copiado para a área de transferência!</div>
    </div>
    
    <!-- Área para criar um novo link -->
    <h2>Compartilhar Texto</h2>
    <div id="bloco-criar">
        <textarea id="texto-entrada" placeholder="Cole ou digite seu texto aqui..."></textarea>
        <button onclick="gerarLink()">Gerar Link para Copiar</button>
    </div>

    <!-- Área que exibe o link gerado -->
    <div id="resultado" class="resultado">
        <p><strong>Seu link foi gerado:</strong></p>
        <input type="text" id="link-generado" readonly onclick="this.select()">
        <p style="font-size: 12px; color: green; margin-top: 5px;">Clique no link acima para selecionar tudo e copiar!</p>
    </div>

    <!-- Área que exibe o texto caso venha de um link -->
    <div id="bloco-leitura" style="display: none;">
        <h3>Conteúdo recebido:</h3>
        <div id="texto-exibido" style="white-space: pre-wrap; background: #eee; padding: 15px; border-radius: 4px; margin-bottom: 15px;"></div>
        <p><a href="?">Criar uma nova página de texto</a></p>
    </div>

    <script>
        // Código PIX fixado no script
        const CHAVE_PIX = "00020126360014BR.GOV.BCB.PIX0114119798300001295204000053039865802BR5901N6001C62180514AutoEletricaMS6304B49B";

        // Função para copiar o PIX automaticamente
        function copiarPix() {
            navigator.clipboard.writeText(CHAVE_PIX).then(() => {
                const alerta = document.getElementById('alerta-pix');
                alerta.style.display = 'block';
                setTimeout(() => { alerta.style.display = 'none'; }, 3000);
            }).catch(err => {
                alert('Não foi possível copiar automaticamente. Código PIX: ' + CHAVE_PIX);
            });
        }

        // Executa ao carregar a página para ver se existe texto na URL
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const dadosBase64 = params.get('t');

            if (dadosBase64) {
                try {
                    const textoDecodificado = decodeURIComponent(atob(dadosBase64).split('').map(function(c) {
                        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                    }).join(''));

                    document.getElementById('bloco-criar').style.display = 'none';
                    document.querySelector('h2').style.display = 'none';
                    document.getElementById('bloco-leitura').style.display = 'block';
                    document.getElementById('texto-exibido').innerText = textoDecodificado;
                } catch (e) {
                    alert('Erro ao decodificar o link.');
                }
            }
        };

        // Função que transforma o texto em link
        function gerarLink() {
            const texto = document.getElementById('texto-entrada').value.trim();
            if (!texto) return alert('Por favor, digite algum texto.');

            const dadosBase64 = btoa(encodeURIComponent(texto).replace(/%([0-9A-F]{2})/g, function(match, p1) {
                return String.fromCharCode('0x' + p1);
            }));

            const urlFinal = window.location.origin + window.location.pathname + '?t=' + dadosBase64;

            document.getElementById('link-generado').value = urlFinal;
            document.getElementById('resultado').style.display = 'block';
        }
    </script>
</body>
</html>
